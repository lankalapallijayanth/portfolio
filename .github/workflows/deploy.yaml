name: Deploy React App
on:
 push:
   branches: [main]
permissions:
 contents: write
 pages: write
 id-token: write
jobs:
 build-and-deploy:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - uses: actions/setup-node@v4
       with:
         node-version: '20'
         cache: 'npm'
     - run: npm ci
     - run: npm run build
     - uses: JamesIves/github-pages-deploy-action@v4
       with:
         folder: build
         branch: gh-pages
